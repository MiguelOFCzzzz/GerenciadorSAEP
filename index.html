<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="index.css">
    <style>
        body {
            /* Imagem de fundo configurada para cobrir a tela toda */
            background-image: url(https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQEmr34bC5Qkf-73YdonIr_mRG7as9uBnj84g&s);
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        /* Estilo básico para o card de login ficar legível sobre o fundo */
        section {
            background-color: rgba(255, 255, 255, 0.9); /* Branco com transparência */
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            width: 300px;
        }
    </style>
</head>
<body>

    <section>
        <h2>Acessar Conta</h2>
        <form action="gestao-de-estoque/gestao.html" method="GET">
    
            <div>
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="Digite seu e-mail" required>
            </div>
            <br>
            <div>
                <label for="senha">Senha</label>
                <input type="password" id="senha" placeholder="Sua senha" required>
            </div>
            <br>
            <button type="submit">Entrar</button>
        </form>
    </section>

</body>
</html>
